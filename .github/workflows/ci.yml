name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: malahim
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: codereviewdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql://malahim:testpassword@localhost:5432/codereviewdb
          REDIS_URL: redis://localhost:6379
          GEMINI_API_KEY: test_key
          GITHUB_WEBHOOK_SECRET: test_secret
          GITHUB_TOKEN: test_token
          POSTGRES_USER: malahim
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: codereviewdb
        run: pytest app/tests/ -v